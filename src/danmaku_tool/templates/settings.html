{% extends "base.html" %}

{% block title %}全局设置 — danmaku-tool{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">全局设置</h1>

    <!-- 弹幕样式 -->
    <div class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">弹幕样式</h2>
        <p class="text-sm text-gray-500 mb-6">修改后自动保存，对所有新建压制和 ASS 生成任务生效。</p>

        <div class="space-y-5">
            <!-- 字体 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">字体</label>
                <div class="flex items-center space-x-3">
                    <select id="setting-font-family"
                        class="flex-1 max-w-xs px-3 py-2 border border-gray-300 rounded-lg text-sm bg-white focus:ring-2 focus:ring-primary-500 focus:border-primary-500">
                        <option value="">加载中...</option>
                    </select>
                    <span id="font-status" class="text-xs text-gray-400"></span>
                </div>
            </div>

            <!-- 字体大小 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    字体大小
                    <span class="text-gray-400 font-normal">— 基于 1080p，其他分辨率自动缩放</span>
                </label>
                <input type="number" id="setting-font-size" min="8" max="120" step="1"
                    class="w-32 px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono">
            </div>

            <!-- 不透明度 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">不透明度</label>
                <div class="flex items-center space-x-3">
                    <input type="range" id="setting-opacity-range" min="0" max="1" step="0.01"
                        class="w-48 accent-primary-600">
                    <input type="number" id="setting-opacity" min="0" max="1" step="0.01"
                        class="w-20 px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono">
                </div>
            </div>

            <!-- 描边宽度 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">描边宽度</label>
                <input type="number" id="setting-outline-width" min="0" max="10" step="1"
                    class="w-32 px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono">
            </div>

            <!-- 每秒弹幕上限 -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    每秒弹幕上限
                    <span class="text-gray-400 font-normal">— 同一秒内最多显示的弹幕条数</span>
                </label>
                <input type="number" id="setting-max-per-second" min="1" max="60" step="1"
                    class="w-32 px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono">
            </div>
        </div>
    </div>

    <!-- 保存按钮 -->
    <div class="flex justify-end items-center space-x-4">
        <span id="save-status" class="text-sm text-gray-400"></span>
        <button id="btn-save" onclick="saveSettings()"
            class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 text-sm font-medium disabled:opacity-50"
            disabled>
            保存设置
        </button>
        <button onclick="resetToDefaults()"
            class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 text-sm">
            恢复默认
        </button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/settings.js"></script>
{% endblock %}
