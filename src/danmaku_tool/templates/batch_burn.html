{% extends "base.html" %}

{% block title %}批量压制 — danmaku-tool{% endblock %}

{% block content %}
<div class="mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">批量压制</h1>

    <!-- 会话列表 -->
    <div class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-lg font-semibold text-gray-800">📂 会话列表</h2>
            <button onclick="loadSessions()" class="text-sm text-primary-600 hover:text-primary-800">刷新</button>
        </div>
        <div id="session-list" class="space-y-3">
            <div class="text-sm text-gray-400 py-4 text-center">加载中...</div>
        </div>
    </div>

    <!-- 压制参数 -->
    <div id="params-section" class="bg-white rounded-lg border border-gray-200 p-6 mb-6 hidden">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">⚙️ 压制参数</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">编码器</label>
                <div class="flex space-x-4">
                    <label class="flex items-center">
                        <input type="radio" name="encoder" value="nvenc" class="mr-2"> NVENC (GPU)
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="encoder" value="cpu" class="mr-2"> CPU (libx264)
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="encoder" value="auto" checked class="mr-2"> 自动
                    </label>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">帧率</label>
                <input type="number" id="fps" value="30" min="24" max="60"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
            </div>
        </div>
    </div>

    <!-- 操作按钮 -->
    <div id="action-section" class="flex justify-end space-x-3 mb-6 hidden">
        <button id="btn-ass-only" onclick="submitAssOnly()"
            class="px-6 py-2 border border-primary-400 text-primary-700 bg-primary-50 rounded-lg hover:bg-primary-100 text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed"
            disabled>
            仅生成 ASS
        </button>
        <button id="btn-batch-burn" onclick="submitBatchBurn()"
            class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed"
            disabled>
            批量压制
        </button>
    </div>

    <!-- 提交结果 -->
    <div id="result-section" class="bg-white rounded-lg border border-gray-200 p-6 hidden">
        <h2 id="result-title" class="text-lg font-semibold text-gray-800 mb-4"></h2>
        <div id="result-body" class="text-sm text-gray-700 space-y-2"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/batch_burn.js"></script>
{% endblock %}
