{% extends "base.html" %}

{% block title %}新建压制任务 — danmaku-tool{% endblock %}

{% block content %}
<div class="mx-auto">
    <h1 class="text-2xl font-bold text-gray-900 mb-6">新建压制任务</h1>

    <!-- 文件选择器 -->
    <div class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">📁 文件选择</h2>

        <!-- 文件浏览器 -->
        <div id="file-browser" class="border border-gray-200 rounded-lg mb-4">
            <div id="browser-breadcrumb"
                class="px-4 py-2 bg-gray-50 border-b border-gray-200 text-sm text-gray-600 flex items-center space-x-1">
                <span class="cursor-pointer hover:text-primary-600" onclick="browsePath('')">根目录</span>
            </div>
            <div id="browser-list" class="max-h-64 overflow-y-auto divide-y divide-gray-100">
                <div class="px-4 py-3 text-gray-400 text-sm">加载中...</div>
            </div>
        </div>

        <!-- 已选择的文件 -->
        <div class="space-y-3">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">视频文件</label>
                <div class="flex items-center space-x-2">
                    <input type="text" id="video-path" readonly
                        class="flex-1 px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 text-sm"
                        placeholder="点击文件浏览器中的 [选择] 按钮选择 .mp4 文件">
                    <button onclick="clearSelection('video')"
                        class="px-3 py-2 text-sm text-gray-500 hover:text-red-500">清除</button>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">弹幕文件（JSONL 或 ASS）</label>
                <div class="flex items-center space-x-2">
                    <input type="text" id="ass-path" readonly
                        class="flex-1 px-3 py-2 border border-gray-300 rounded-lg bg-gray-50 text-sm"
                        placeholder="点击文件浏览器中的 [选择] 按钮选择 .jsonl 或 .ass 文件">
                    <button onclick="clearSelection('ass')"
                        class="px-3 py-2 text-sm text-gray-500 hover:text-red-500">清除</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 压制参数 -->
    <div class="bg-white rounded-lg border border-gray-200 p-6 mb-6">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">⚙️ 压制参数</h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">编码器</label>
                <div class="flex space-x-4" id="encoder-group">
                    <label class="flex items-center">
                        <input type="radio" name="encoder" value="nvenc" class="mr-2"> NVENC (GPU)
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="encoder" value="cpu" class="mr-2"> CPU (libx264)
                    </label>
                    <label class="flex items-center">
                        <input type="radio" name="encoder" value="auto" checked class="mr-2"> 自动
                    </label>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">帧率</label>
                <input type="number" id="fps" value="30" min="24" max="60"
                    class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
            </div>
        </div>
        <div class="mt-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">
                弹幕时间偏移（ms）
                <span class="text-gray-400 font-normal">— 视频晚于录制开始的时间，选择视频后自动计算</span>
            </label>
            <div class="flex items-center space-x-3">
                <input type="number" id="offset-ms" value="0" min="0"
                    class="w-48 px-3 py-2 border border-gray-300 rounded-lg text-sm font-mono" placeholder="0">
                <span id="offset-hint" class="text-xs text-gray-400"></span>
            </div>
        </div>
        <div class="mt-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">输出路径（留空自动生成）</label>
            <div class="flex items-center space-x-2">
                <input type="text" id="output-path" class="flex-1 px-3 py-2 border border-gray-300 rounded-lg text-sm"
                    placeholder="加载中...">
                <button onclick="autoFillOutputPath()" title="根据配置自动填入输出路径"
                    class="px-3 py-2 text-sm text-primary-600 border border-primary-300 rounded-lg hover:bg-primary-50 whitespace-nowrap">
                    自动填入
                </button>
            </div>
        </div>
    </div>

    <!-- 提交 -->
    <div class="flex justify-end space-x-3">
        <a href="/" class="px-6 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 text-sm">取消</a>
        <button id="btn-test" onclick="showConfirm('test')"
            class="px-6 py-2 border border-amber-400 text-amber-700 bg-amber-50 rounded-lg hover:bg-amber-100 text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed"
            disabled>
            压制测试（60s）
        </button>
        <button id="btn-submit" onclick="showConfirm()"
            class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 text-sm font-medium disabled:opacity-50 disabled:cursor-not-allowed"
            disabled>
            开始压制
        </button>
    </div>

    <!-- 测试压制进度与预览 -->
    <div id="test-section" class="bg-white rounded-lg border border-gray-200 p-6 mt-6 hidden">
        <h2 class="text-lg font-semibold text-gray-800 mb-4">🧪 压制测试</h2>

        <!-- 进度 -->
        <div id="test-progress-wrap" class="mb-4">
            <div class="flex justify-between items-center mb-2">
                <span id="test-progress-status" class="text-sm font-medium text-gray-700">排队中</span>
                <span id="test-progress-speed" class="text-sm text-gray-400"></span>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-2.5">
                <div id="test-progress-bar" class="bg-amber-500 h-2.5 rounded-full transition-all duration-300"
                    style="width: 0%"></div>
            </div>
            <div class="flex justify-between text-xs text-gray-400 mt-1">
                <span id="test-progress-percent">0%</span>
                <span id="test-progress-time"></span>
            </div>
        </div>

        <!-- 错误信息 -->
        <div id="test-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
        </div>

        <!-- 视频预览 -->
        <div id="test-preview-wrap" class="hidden">
            <div class="flex items-center justify-between mb-2">
                <span class="text-sm font-medium text-gray-700">预览（前 60 秒）</span>
                <span id="test-output-size" class="text-xs text-gray-400"></span>
            </div>
            <video id="test-video-player" controls class="w-full rounded-lg border border-gray-200 bg-black"
                style="max-height: 480px;"></video>
        </div>
    </div>
</div>

<!-- 确认弹窗 -->
<div id="confirm-modal" class="fixed inset-0 z-50 hidden">
    <div class="absolute inset-0 bg-black/40" onclick="hideConfirm()"></div>
    <div class="relative mx-auto mt-24 w-full max-w-lg bg-white rounded-xl shadow-2xl border border-gray-200">
        <div class="px-6 py-4 border-b border-gray-200">
            <h3 id="confirm-title" class="text-lg font-semibold text-gray-900">确认压制参数</h3>
        </div>
        <div id="confirm-body" class="px-6 py-4 space-y-2 text-sm"></div>
        <div class="px-6 py-4 border-t border-gray-200 flex justify-end space-x-3">
            <button onclick="hideConfirm()"
                class="px-4 py-2 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 text-sm">取消</button>
            <button id="confirm-action-btn" onclick="submitTask()"
                class="px-6 py-2 bg-primary-600 text-white rounded-lg hover:bg-primary-700 text-sm font-medium">确认开始</button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/file_picker.js"></script>
<script src="/static/js/progress.js"></script>
<script src="/static/js/burn.js"></script>
{% endblock %}
